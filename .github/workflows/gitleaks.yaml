name: Gitleaks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    name: Scan for Leaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate gitleaks config
        run: |
          cat > .gitleaks.toml << EOF
          [extend]
          useDefault = true

          [[rules]]
          id = "personal-domain"
          description = "Personal domain leaked"
          regex = '''${{ secrets.PERSONAL_DOMAIN }}'''
          EOF

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
