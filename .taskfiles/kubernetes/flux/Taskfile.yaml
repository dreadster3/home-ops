---
version: "3"

tasks:
  reconcile:source:
    desc: Reconcile the kubernetes cluster source
    cmd: flux reconcile source git flux-system
    preconditions:
      - sh: which flux

  reconcile:kustomization:*:
    desc: Reconcile the kubernetes cluster source
    preconditions:
      - sh: which flux
    vars:
      NAMESPACE: "flux-system"
      KUSTOMIZATION: "{{.MATCH | first}}"
    cmd: flux reconcile kustomization -n {{.NAMESPACE}} {{.KUSTOMIZATION}}

  diff:
    desc: Output the diff of the current changes
    cmds:
      - flux-local diff ks --sources flux-system --path {{.PATH}}
      - flux-local diff hr --sources flux-system --path {{.PATH}}
    vars:
      PATH: "kubernetes/clusters/production"
    preconditions:
      - sh: which flux-local
        msg: flux-local is not installed
      - sh: which flux
        msg: flux is not installed

  test:
    desc: Verify that resources are valid
    cmds:
      - flux-local test --all-namespaces --path {{.PATH}} --enable-helm {{if .CLI_VERBOSE}}--verbose{{end}}
    vars:
      PATH: "kubernetes/clusters/production"
    preconditions:
      - sh: which flux-local
        msg: flux-local is not installed
      - sh: which flux
        msg: flux is not installed

  bootstrap:
    desc: Bootstrap the cluster
    vars:
      CLUSTER_NAME: dev
    cmds:
      - helm install flux-operator oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator --namespace flux-system --create-namespace
      - kustomize build kubernetes/infrastructure/overlays/{{.CLUSTER_NAME}}/platform/flux/instance | yq "select(document_index == 0) | .spec.values" | helm install flux-instance oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance --namespace flux-system --create-namespace -f -
      - kubectl create secret generic -n flux-system flux-system
      - kubectl create secret generic -n flux-system secrets
      - kubectl create configmap -n flux-system settings
