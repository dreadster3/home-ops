apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app maddy
  namespace: maddy
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/foxcpp/maddy
              tag: 0.7.1
            env:
              TZ: ${TIMEZONE}
              SERVER_HOSTNAME: maddy.maddy.svc.cluster.local
              SERVER_SMTP_PORT: &smtp_port 2525
              SERVER_METRICS_PORT: &metrics_port 9749
            envFrom:
              - secretRef:
                  name: maddy-secret-env
            ports:
              - containerPort: *smtp_port
                name: smtp
                protocol: TCP
              - containerPort: *metrics_port
                name: metrics
                protocol: TCP
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: smtp
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  tcpSocket:
                    port: smtp
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: smtp
                  periodSeconds: 5
                  failureThreshold: 12
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

    service:
      main:
        controller: main
        ports:
          smtp:
            port: 25
            targetPort: smtp
          metrics:
            port: 9749
            targetPort: metrics

    serviceMonitor:
      main:
        enabled: true
        service:
          identifier: main
        endpoints:
          - port: metrics
            scheme: http

    persistence:
      config:
        type: configMap
        name: maddy-config
        globalMounts:
          - path: /etc/maddy/maddy.conf
            subPath: maddy.conf
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
