apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: netbird-operator
  namespace: netbird
spec:
  interval: 24h
  url: https://netbirdio.github.io/kubernetes-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app netbird-operator
  namespace: netbird
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes-operator
      version: 0.x.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: *app
  values:
    managementURL: https://netbird.${EXTERNAL_DOMAIN}
    routingClientImage: ghcr.io/netbirdio/netbird:0.66.4-rootless

    clusterSecretsPermissions:
      allowAllSecrets: false

    operator:
      ingress:
        enabled: true
        allowAutomaticPolicyCreation: true

    gatewayAPI:
      enabled: true

    netbirdAPI:
      keyFromSecret:
        name: netbird-api-key
        key: NB_API_KEY
