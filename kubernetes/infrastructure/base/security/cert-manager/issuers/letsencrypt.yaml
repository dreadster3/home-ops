apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: afonso.antunes@live.com.pt
    privateKeySecretRef:
      name: letsencrypt-dns-private-key
    solvers:
      - dns01:
          cloudflare:
            email: afonso.antunes@live.com.pt
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: TOKEN
        selector:
          dnsZones:
            - ${EXTERNAL_DOMAIN}
