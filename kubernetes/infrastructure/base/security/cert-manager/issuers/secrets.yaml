apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: /cloudflare/API_TOKEN
