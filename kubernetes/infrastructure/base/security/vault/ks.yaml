apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app vault
  namespace: *app
spec:
  targetNamespace: *app
  commonMetadata:
    labels:
      app.kubernetes.io/module: *app
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *app
  path: ./kubernetes/infrastructure/base/security/vault/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 1h
  timeout: 5m
