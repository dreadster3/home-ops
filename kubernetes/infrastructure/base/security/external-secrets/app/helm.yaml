apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 24h
  url: https://charts.external-secrets.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 2.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  values:
    installCRDs: true
    serviceMonitor:
      enabled: true
      renderMode: alwaysRender
    grafanaDashboard:
      enabled: true
      sidecarLabel: "grafana/dashboard"
      sidecarLabelValue: "true"
      annotations:
        grafana/folder: ESO
