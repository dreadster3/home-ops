apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app grafana
  namespace: &namespace monitoring
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/module: *app
  # healthChecks:
  #   - apiVersion: helm.toolkit.fluxcd.io/v2
  #     kind: HelmRelease
  #     name: *app
  #     namespace: *namespace
  path: ./kubernetes/infrastructure/base/observability/grafana/app
  prune: true
  # Cannot wait since it depends on authentik that is deployed much after and needs manual intervention
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: loki
      namespace: monitoring
  interval: 1h
  timeout: 5m
