apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helm.yaml
  - secrets.yaml

configMapGenerator:
  - name: grafana-dashboards
    options:
      disableNameSuffixHash: true
      labels:
        grafana/dashboard: "true"
      annotations:
        grafana/folder: Other
    files:
      - dashboards/peanut.json
      - dashboards/speedtracker.json
