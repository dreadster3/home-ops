apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - helm.yaml
  - scrapeconfig.yaml
  - httproute.yaml

configMapGenerator:
  - name: alloy
    options:
      disableNameSuffixHash: true
      labels:
        app.kubernetes.io/component: config
    files:
      - config.alloy

  - name: dashboards
    options:
      disableNameSuffixHash: true
      labels:
        grafana/dashboard: "true"
    files:
      - dashboards/cadvisor.json
