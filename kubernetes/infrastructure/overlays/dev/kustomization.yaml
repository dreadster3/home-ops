apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/category: infrastructure
      app.kubernetes.io/environment: dev

resources:
  - ../../base/security
  - ../../base/databases
  - ../../base/observability
  - ../../base/platform
  - ../../base/networking
  - platform

patches:
  - target:
      kind: Secret
      name: secrets
    patch: |-
      - op: replace
        path: /stringData/INTERNAL_DOMAIN
        value: internal.localhost
      - op: replace
        path: /stringData/EXTERNAL_DOMAIN
        value: localhost
      - op: remove
        path: /sops
  - target:
      kind: Kustomization
      name: envoy-gateway-config
      namespace: networking
    patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: envoy-gateway-config
        namespace: networking
      spec:
        patches:
          - target:
              kind: Certificate
              name: letsencrypt-internal-domain-tls
            patch: |-
              - op: replace
                path: /spec/issuerRef/name
                value: cluster-root
