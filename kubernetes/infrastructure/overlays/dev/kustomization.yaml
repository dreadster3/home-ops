apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/category: infrastructure
      app.kubernetes.io/environment: dev

resources:
  - ../../base/security
  - ../../base/databases
  - ../../base/observability
  - ../../base/platform
  - ../../base/networking
  - platform

patches:
  - target:
      kind: Secret
      name: secrets
    patch: |-
      - op: replace
        path: /stringData/INTERNAL_DOMAIN
        value: internal.localhost
      - op: replace
        path: /stringData/EXTERNAL_DOMAIN
        value: localhost
      - op: remove
        path: /sops
  - target:
      kind: Kustomization
      name: cert-manager-issuers
    patch: |-
      - op: add
        path: /patches/-
        value: |-
          - patch: |-
              apiVersion: cert-manager.io/v1
              kind: ClusterIssuer
              metadata:
                name: letsencrypt-production
              spec:
                ca:
                  secretName: cluster-intermediate-ca
            target:
              kind: ClusterIssuer
              name: letsencrypt-production
