apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/category: infrastructure
      app.kubernetes.io/environment: dev

resources:
  - ../../base/security
  - ../../base/databases
  - ../../base/observability
  - ../../base/platform
  - ../../base/networking

patches:
  - target:
      kind: Secret
      name: secrets
    patch: |-
      - op: replace
        path: /stringData/INTERNAL_DOMAIN
        value: intra.localhost
      - op: replace
        path: /stringData/EXTERNAL_DOMAIN
        value: localhost
      - op: remove
        path: /sops
  - target:
      kind: ConfigMap
      name: settings
    patch: |-
      - op: replace
        path: /data/EXTERNAL_ADDRESS_POOL
        value: 10.6.0.64/26
  # - target:
  #     kind: Kustomization
  #     name: cilium-config
  #   patch: |-
  #     - op: replace
  #       path: /spec/path
  #       value: ./kubernetes/infrastructure/overlays/dev/networking/cilium/config
  - target:
      kind: Kustomization
      name: envoy-gateway-config
    patch: |-
      - op: replace
        path: /spec/path
        value: ./kubernetes/infrastructure/overlays/dev/networking/envoy-gateway/config
  - target:
      kind: Kustomization
      name: flux-instance
    patch: |-
      - op: replace
        path: /spec/path
        value: ./kubernetes/infrastructure/overlays/dev/platform/flux/instance
  # Minikube has builtin Cilium
  - target:
      kind: Kustomization
      name: cilium
    patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: cilium
        namespace: cilium-system
  # Remove cilium-configs dependsOn
  - target:
      kind: Kustomization
      name: cilium-config
    patch: |-
      - op: remove
        path: /spec/dependsOn
  - target:
      kind: Kustomization
      name: cilium-policies
    patch: |-
      - op: remove
        path: /spec/dependsOn
  - target:
      kind: Kustomization
      name: external-dns
    patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: external-dns
        namespace: external-dns
  - target:
      kind: Kustomization
      name: metrics-server
    patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: metrics-server
        namespace: metrics-server
  - target:
      kind: Kustomization
      name: netbird-operator
    patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: netbird-operator
        namespace: netbird
  - target:
      kind: Kustomization
      name: netbird-operator-config
    patch: |-
      $patch: delete
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: netbird-operator-config
        namespace: netbird
