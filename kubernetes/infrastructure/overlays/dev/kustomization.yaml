apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/category: infrastructure
      app.kubernetes.io/environment: dev

resources:
  - ../../base/security
  - ../../base/databases
  - ../../base/observability
  - ../../base/platform

patches:
  - patch: |-
      - op: replace
        path: /spec/sync/path
        value: kubernetes/clusters/dev
    target:
      kind: FluxInstance
      name: flux
