apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../base/networking/envoy-gateway/config

patches:
  - target:
      kind: Certificate
      name: letsencrypt-internal-domain-tls
    patch: |-
      - op: replace
        path: /spec/issuerRef/name
        value: cluster-root
