cluster:
  network:
    cni:
      name: none
  proxy:
    disabled: true
  apiServer:
    extraArgs:
      oidc-issuer-url: https://authentik.${INTERNAL_DOMAIN}/application/o/kubernetes/
      oidc-client-id: kubernetes
      oidc-username-claim: preferred_username
      oidc-groups-claim: groups
      oidc-groups-prefix: "oidc:"
      oidc-username-prefix: "oidc:"
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
machine:
  kubelet:
    extraConfig:
      serverTLSBootstrap: true
    extraArgs:
      rotate-server-certificates: true
      feature-gates: CSIVolumeHealth=true
  install:
    disk: /dev/sda
    image: factory.talos.dev/nocloud-installer/ddf38e55e30aa9b2bb0b765054ed63444dc00244ab8bb4ad4ad92486602285f8:v1.12.6
  kernel:
    modules:
      - name: ipv6
        parameters:
          - disable=1
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: kubectrl02
---
apiVersion: v1alpha1
kind: LinkConfig
name: eth0
up: true
addresses:
  - address: 192.168.30.34/24
routes:
  - gateway: 192.168.30.1
---
apiVersion: v1alpha1
kind: ResolverConfig
nameservers:
  - address: 192.168.30.2
  - address: 192.168.30.3
---
apiVersion: v1alpha1
kind: TimeSyncConfig
bootTimeout: 2m
ptp:
  devices:
    - /dev/ptp0
