apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
  namespace: paperless
  labels:
    nfsMount: "true"
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: 4.6.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.13@sha256:4b05bcd28e6923768000b5d247cbf2c66fd49bdc3f3b05955bd4f6790a638b01
            env:
              USERMAP_UID: 4100
              USERMAP_GID: 4100
              PAPERLESS_TIME_ZONE: Europe/Lisbon
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_ALLOWED_HOSTS: paperless.${INTERNAL_DOMAIN},paperless.${EXTERNAL_DOMAIN}
              PAPERLESS_CORS_ALLOWED_HOSTS: https://paperless.${INTERNAL_DOMAIN},https://paperless.${EXTERNAL_DOMAIN}
              PAPERLESS_CSRF_TRUSTED_ORIGINS: https://paperless.${INTERNAL_DOMAIN},https://paperless.${EXTERNAL_DOMAIN}
              PAPERLESS_OCR_LANGUAGE: eng+por
              PAPERLESS_OCR_LANGUAGES: eng por
              PAPERLESS_WEBSERVER_WORKERS: 2
              PAPERLESS_TASK_WORKERS: 2
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_LOGOUT_REDIRECT_URL: "https://authentik.${EXTERNAL_DOMAIN}/application/o/paperless/end-session/"
              PAPERLESS_SOCIAL_AUTO_SIGNUP: true
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: true
              PAPERLESS_SOCIAL_ACCOUNT_SYNC_GROUPS: true
              PAPERLESS_EMAIL_FROM: no-reply@${EXTERNAL_DOMAIN}
              # PAPERLESS_CONSUMER_DISABLE: false
              PAPERLESS_CONSUMPTION_DIR: &consume /usr/src/paperless/consume
              PAPERLESS_CONSUMER_RECURSIVE: true
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: false
              PAPERLESS_CONSUMER_DELETE_DUPLICATES: true
              PAPERLESS_CONSUMER_POLLING: 30
              PAPERLESS_DISABLE_REGULAR_LOGIN: true
              PAPERLESS_REDIRECT_LOGIN_TO_SSO: true
              S6_READ_ONLY_ROOT: 1
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
            envFrom:
              - secretRef:
                  name: paperless-secret-env
            ports:
              - containerPort: 8000
                name: http
                protocol: TCP
            resources:
              requests:
                cpu: 900m
                memory: &memory 2Gi
              limits:
                memory: *memory
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  initialDelaySeconds: 120
                  timeoutSeconds: 3
                  failureThreshold: 15
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        pod:
          # Needs to run as root to install OCR packages
          # TODO: Build a custom image with OCR packages builtin to remove this dependency and run as nonroot
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault

    service:
      main:
        controller: main
        ports:
          http:
            port: 80
            targetPort: http

    route:
      main:
        hostnames:
          - paperless.${INTERNAL_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: envoy
        rules:
          - backendRefs:
              - identifier: main
                port: http

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: nfs
        size: 10Gi
        advancedMounts:
          main:
            main:
              - path: /usr/src/paperless/data
      media:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: nfs
        size: 50Gi
        advancedMounts:
          main:
            main:
              - path: /usr/src/paperless/media
      consume:
        type: nfs
        server: 192.168.30.20
        path: /mnt/main/PaperlessConsume
        advancedMounts:
          main:
            main:
              - path: *consume

      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /run
            subPath: run
