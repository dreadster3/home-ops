apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
  namespace: openwebui
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: 4.6.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  # dependsOn:
  #   - name: ollama
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.8.12@sha256:8113fa5510020ef05a44afc0c42d33eabeeb2524a996e3e3fb8c437c00f0d792
            # command: ["/bin/sh"]
            # args:
            #   - -c
            #   - |
            #     # Install the correct dependency
            #     pip install --no-cache-dir datasets==3.6.0
            #
            #     # Run the original entrypoint
            #     exec /app/backend/start.sh
            env:
              OLLAMA_BASE_URL: https://ollama.${INTERNAL_DOMAIN}

              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: "redis"

              WEBUI_URL: https://openwebui.${EXTERNAL_DOMAIN}

              # OAuth
              OPENID_PROVIDER_URL: https://authentik.${EXTERNAL_DOMAIN}/application/o/open-web-ui/.well-known/openid-configuration
              OPENID_REDIRECT_URI: https://openwebui.${EXTERNAL_DOMAIN}/oauth/oidc/callback
              OAUTH_SCOPES: openid email profile
              OAUTH_PROVIDER_NAME: Authentik
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: true
              ENABLE_OAUTH_SIGNUP: true
              ENABLE_LOGIN_FORM: false

              # STT
              WHISPER_MODEL: base
              WHISPER_MULTILINGUAL: true

              # TTS
              AUDIO_TTS_ENGINE: transformers
              AUDIO_TTS_MODEL: slt
              AUDIO_TTS_SPLIT_ON: punctuation

              # Search Engine
              ENABLE_WEB_SEARCH: true
              ENABLE_SEARCH_QUERY_GENERATION: true
              WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng.searxng.svc.cluster.local/search?q=<query>

              EXTRA_PIP_PACKAGES: datasets==3.6.0

              REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
            envFrom:
              - secretRef:
                  name: openwebui-secret-env
            ports:
              - containerPort: 8080
                name: http
                protocol: TCP
            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 1Gi

    service:
      main:
        controller: main
        annotations:
          netbird.io/expose: "true"
        ports:
          http:
            port: 80
            targetPort: http

    route:
      main:
        hostnames:
          - openwebui.${INTERNAL_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: envoy
        rules:
          - backendRefs:
              - identifier: main
                port: http

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        size: 10Gi
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        globalMounts:
          - path: /app/backend/data
