apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pangolin-newt-1-credentials
  namespace: pangolin
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: pangolin-newt-1-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        PANGOLIN_ENDPOINT: "https://pangolin.${EXTERNAL_DOMAIN}"
        NEWT_ID: "{{ .id }}"
        NEWT_SECRET: "{{ .secret_key }}"
  data:
    - secretKey: id
      remoteRef:
        key: /pangolin/NEWT_1_ID
    - secretKey: secret_key
      remoteRef:
        key: /pangolin/NEWT_1_SECRET_KEY
---
