apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: &app netbox
  namespace: *app
spec:
  interval: 24h
  url: https://charts.netbox.oss.netboxlabs.com/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app netbox
  namespace: *app
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: *app
      version: 8.x
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: netbox
        namespace: netbox
  values:
    timezone: ${TIMEZONE}
    loginRequired: true
    existingSecret: netbox-server

    resources:
      requests:
        cpu: 50m
        memory: &memory 1050Mi
      limits:
        memory: *memory

    worker:
      resources:
        requests:
          cpu: 80m
          memory: 300Mi
        limits:
          memory: 300Mi

    commonAnnotations:
      reloader.stakater.com/auto: "true"
    allowedHosts:
      - &host netbox.${INTERNAL_DOMAIN}
    superuser:
      existingSecret: netbox-superuser
    csrf:
      trustedOrigins:
        - https://netbox.${INTERNAL_DOMAIN}
    persistence:
      enabled: false
    # readinessProbe:
    #   enabled: false
    livenessProbe:
      enabled: false

    ingress:
      enabled: false

    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: envoy
      hostnames:
        - netbox.${INTERNAL_DOMAIN}

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    postgresql:
      enabled: false

    externalDatabase:
      host: netbox-cluster-rw
      port: 5432
      database: netbox
      username: netbox
      existingSecretName: netbox-cluster-credentials
      existingSecretKey: password

    valkey:
      enabled: false

    tasksDatabase: &redis
      host: netbox-dragonfly
      port: 6379
      existingSecretName: netbox-dragonfly-credentials
      existingSecretKey: DRAGONFLY_PASSWORD

    cachingDatabase: *redis

    email:
      server: maddy.maddy.svc.cluster.local
      port: 25
      useTLS: false
      from: no-reply@${EXTERNAL_DOMAIN}
      existingSecretName: netbox-smtp

    remoteAuth:
      enabled: true
      backends:
        - social_core.backends.open_id_connect.OpenIdConnectAuth
      autoCreateUser: true
      autoCreateGroup: true

    extraConfig:
      - values:
          SOCIAL_AUTH_PIPELINE:
            - "social_core.pipeline.social_auth.social_details"
            - "social_core.pipeline.social_auth.social_uid"
            - "social_core.pipeline.social_auth.social_user"
            - "social_core.pipeline.user.get_username"
            - "social_core.pipeline.social_auth.associate_by_email"
            - "social_core.pipeline.user.create_user"
            - "social_core.pipeline.social_auth.associate_user"
            - "netbox.authentication.user_default_groups_handler"
            - "social_core.pipeline.social_auth.load_extra_data"
            - "social_core.pipeline.user.user_details"
            # Custom group pipeline
            - "netbox.group_pipeline.add_groups"
            - "netbox.group_pipeline.remove_groups"
            - "netbox.group_pipeline.set_roles"
    extraVolumes:
      - name: netbox-configuration-scripts
        configMap:
          name: netbox-configuration-scripts

    extraVolumeMounts:
      - name: netbox-configuration-scripts
        mountPath: /etc/netbox/config/authentik.py
        subPath: authentik.py
        readOnly: true
      - name: netbox-configuration-scripts
        mountPath: /opt/netbox/netbox/netbox/group_pipeline.py
        subPath: group_pipeline.py
        readOnly: true
      - name: netbox-configuration-scripts
        mountPath: /etc/netbox/config/storages.py
        subPath: storages.py
        readOnly: true

    extraEnvs:
      - name: AWS_ENDPOINT_URL
        value: http://rook-ceph-rgw-k8s-ceph-objectstore.rook-ceph.svc
      - name: AWS_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: netbox-bucket
            key: BUCKET_NAME
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: netbox-bucket
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: netbox-bucket
            key: AWS_SECRET_ACCESS_KEY
      - name: DB_WAIT_DEBUG
        value: "1"
      - name: SOCIAL_AUTH_OIDC_OIDC_ENDPOINT
        value: https://authentik.${INTERNAL_DOMAIN}/application/o/netbox
      - name: SOCIAL_AUTH_OIDC_KEY
        valueFrom:
          secretKeyRef:
            name: netbox-oidc
            key: client_id
      - name: SOCIAL_AUTH_OIDC_SECRET
        valueFrom:
          secretKeyRef:
            name: netbox-oidc
            key: client_secret
      - name: SOCIAL_AUTH_OIDC_SCOPE
        value: openid email profile netbox
      - name: SOCIAL_AUTH_OIDC_USERNAME_KEY
        value: preferred_username
      - name: LOGOUT_REDIRECT_URL
        value: https://authentik.${INTERNAL_DOMAIN}/application/o/netbox/end-session/
