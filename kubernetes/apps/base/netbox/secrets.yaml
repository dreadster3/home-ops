apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-postgres
  namespace: netbox
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: netbox-cluster-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: /netbox/POSTGRES_USERNAME
    - secretKey: password
      remoteRef:
        key: /netbox/POSTGRES_PASSWORD
---
