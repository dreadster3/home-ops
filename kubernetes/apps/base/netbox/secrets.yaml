---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser
  namespace: netbox
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: netbox-superuser
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: admin
        email: no-reply@${EXTERNAL_DOMAIN}
        api_token: "{{ .api_token }}"
        password: "{{ .password }}"
  data:
    - secretKey: api_token
      remoteRef:
        key: /netbox/ADMIN_API_TOKEN
    - secretKey: password
      remoteRef:
        key: /netbox/ADMIN_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-server
  namespace: netbox
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: netbox-server
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: /netbox/SECRET_KEY
    - secretKey: username
      remoteRef:
        key: /netbox/ADMIN_USERNAME
    - secretKey: password
      remoteRef:
        key: /netbox/ADMIN_PASSWORD
    - secretKey: api_token
      remoteRef:
        key: /netbox/ADMIN_API_TOKEN
---
