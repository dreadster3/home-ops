apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-backup-s3-account
  namespace: netbox
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: netbox-backup-s3-account
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ACCESS_KEY: "{{ .access_key }}"
        SECRET_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: /netbox/BACKUP_S3_ACCESS_KEY
    - secretKey: secret_key
      remoteRef:
        key: /netbox/BACKUP_S3_SECRET_KEY
---
