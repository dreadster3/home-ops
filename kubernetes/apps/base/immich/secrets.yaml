apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret-env
  namespace: immich
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-secret-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REDIS_URL: redis://:{{ .redis_password }}@immich-dragonfly:6379/0
        DB_USERNAME: "{{ .dbuser }}"
        DB_PASSWORD: "{{ .dbpass }}"
  data:
    - secretKey: redis_password
      remoteRef:
        key: /immich/DRAGONFLY_PASSWORD
    - secretKey: dbuser
      remoteRef:
        key: /immich/POSTGRES_USERNAME
    - secretKey: dbpass
      remoteRef:
        key: /immich/POSTGRES_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-dragonfly
  namespace: immich
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-dragonfly-credentials
    creationPolicy: Owner
  data:
    - secretKey: DRAGONFLY_PASSWORD
      remoteRef:
        key: /immich/DRAGONFLY_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-postgres
  namespace: immich
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-cluster-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: password
      remoteRef:
        key: /immich/POSTGRES_PASSWORD
    - secretKey: username
      remoteRef:
        key: /immich/POSTGRES_USERNAME
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-backup-s3-account
  namespace: immich
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-backup-s3-account
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ACCESS_KEY: "{{ .access_key }}"
        SECRET_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: /immich/BACKUP_S3_ACCESS_KEY
    - secretKey: secret_key
      remoteRef:
        key: /immich/BACKUP_S3_SECRET_KEY
