apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: deny-all-except-namespace
  namespace: immich
spec:
  description: "Allow traffic only to the namespace itself"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
  ingress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnpg-cluster
  namespace: immich
spec:
  description: "Allow CloudNativePG pods access"
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: immich-cluster
  ingress:
    # Allow access from other cluster pods
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            cnpg.io/cluster: immich-cluster
      toPorts:
        - ports:
            - port: postgresql
              protocol: TCP
    # Allow access from immich pods
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app.kubernetes.io/name: immich
      toPorts:
        - ports:
            - port: postgresql
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redis-cluster
  namespace: immich
spec:
  description: "Allow Redis pods access"
  endpointSelector:
    matchLabels:
      app: immich-redis
  ingress:
    # Immich pods to redis
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app.kubernetes.io/instance: immich
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # Redis to redis
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app: immich-redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # Sentinels to redis
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app: immich-redis-sentinel
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redis-sentinel
  namespace: immich
spec:
  description: "Allow Redis Sentinel pods access"
  endpointSelector:
    matchLabels:
      app: immich-redis-sentinel
  ingress:
    # Immich pods to sentinels
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app.kubernetes.io/name: immich
      toPorts:
        - ports:
            - port: "26379"
              protocol: TCP
    # Sentinels to sentinels
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app: immich-redis-sentinel
      toPorts:
        - ports:
            - port: "26379"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: immich-api
  namespace: immich
spec:
  description: "Allow traffic from and to immich api"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich
      app.kubernetes.io/controller: api
  ingress:
    # Traefik to immich
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik-system
            app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: http
              protocol: TCP

    # Pangolin to immich
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: pangolin
            app.kubernetes.io/name: pangolin
            app.kubernetes.io/component: newt
      toPorts:
        - ports:
            - port: http
              protocol: TCP

    # Alloy to immich
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: alloy
      toPorts:
        - ports:
            - port: metrics-api
              protocol: TCP
            - port: metrics-ms
              protocol: TCP

    # Uptime to immich
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: uptime
            app.kubernetes.io/name: uptime
            app.kubernetes.io/instance: uptime
      toPorts:
        - ports:
            - port: http
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: immich-machine-learning
  namespace: immich
spec:
  description: "Control access to/from immich machine learning server"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich
      app.kubernetes.io/controller: machine-learning
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: immich
            app.kubernetes.io/name: immich
            app.kubernetes.io/controller: api
      toPorts:
        - ports:
            - port: http
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: uptime
            app.kubernetes.io/name: uptime
            app.kubernetes.io/instance: uptime
      toPorts:
        - ports:
            - port: http
              protocol: TCP
  egress:
    # Download models
    - toEntities:
        - world
