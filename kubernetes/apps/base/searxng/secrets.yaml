apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-redis
  namespace: searxng
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: searxng-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: /searxng/REDIS_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng-secret-env
  namespace: searxng
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: searxng-secret-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SEARXNG_SECRET: "{{ .token }}"
        SEARXNG_VALKEY_URL: "valkey://:{{.password}}@searxng-redis-master:6379/0"
  data:
    - secretKey: token
      remoteRef:
        key: /searxng/SECRET_TOKEN
    - secretKey: password
      remoteRef:
        key: /searxng/REDIS_PASSWORD
