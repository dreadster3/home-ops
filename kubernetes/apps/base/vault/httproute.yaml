apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: vault
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy
  hostnames:
    - vault.${INTERNAL_DOMAIN}
  rules:
    - backendRefs:
        - name: vault-active
          port: 8200
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: vault
  namespace: vault
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: vault-active
      sectionName: "8200"
  validation:
    hostname: vault-active.vault.svc.cluster.local
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: vault-ca-tls
