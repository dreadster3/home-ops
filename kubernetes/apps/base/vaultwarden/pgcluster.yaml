apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-cluster
  namespace: vaultwarden
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9-standard-trixie
  instances: 2
  primaryUpdateStrategy: unsupervised
  storage:
    storageClass: ceph-block
    size: 2Gi

  bootstrap:
    recovery:
      source: backup
      database: vaultwarden
      owner: vaultwarden
      secret:
        name: vaultwarden-cluster-credentials
    # initdb:
    #   database: vaultwarden
    #   owner: vaultwarden
    #   secret:
    #     name: vaultwarden-cluster-credentials

  externalClusters:
    - name: backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: backup-store
          serverName: vaultwarden-cluster

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: backup-store

  resources:
    requests:
      cpu: 50m
      memory: &memory 256Mi
    limits:
      memory: *memory

  monitoring:
    enablePodMonitor: true
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: vaultwarden-cluster-backup
  namespace: vaultwarden
spec:
  cluster:
    name: vaultwarden-cluster
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
