apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: harbor-dragonfly
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
  authentication:
    passwordFromSecret:
      name: harbor-dragonfly-credentials
      key: password
  resources:
    # Real resources required
    requests:
      cpu: 15m
      memory: 50Mi
    # Minimum required to initialize due to dragonfly-operator
    limits:
      memory: 512Mi
