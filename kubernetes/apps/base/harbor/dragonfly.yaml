apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: harbor-dragonfly
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  resources:
    # Real resources required
    requests:
      cpu: 15m
      memory: 50Mi
    # Minimum required to initialize due to dragonfly-operator
    limits:
      memory: 256Mi
  authentication:
    passwordFromSecret:
      name: harbor-dragonfly-credentials
      key: password
