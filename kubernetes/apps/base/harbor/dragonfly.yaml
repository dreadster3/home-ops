apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: harbor-dragonfly
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.37.2@sha256:e45de310788d110d621655f6340b5b0818d860210ad6a350a4d277d57c14349a
  replicas: 2
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
  # authentication:
  #   passwordFromSecret:
  #     name: harbor-dragonfly-credentials
  #     key: REDIS_PASSWORD
  resources:
    # Real resources required
    requests:
      cpu: 15m
      memory: 50Mi
    # Minimum required to initialize due to dragonfly-operator
    limits:
      memory: 512Mi
