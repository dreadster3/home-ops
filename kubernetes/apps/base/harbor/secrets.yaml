apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-redis
  namespace: harbor
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: harbor-redis-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REDIS_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /harbor/REDIS_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-secret-key
  namespace: harbor
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: harbor-secret-key
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        secretKey: "{{ .secret_key }}"
  data:
    - secretKey: secret_key
      remoteRef:
        key: /harbor/SECRET_KEY
---
