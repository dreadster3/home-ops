---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-credentials
  namespace: harbor
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: harbor-registry-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        REGISTRY_PASSWD: "{{ .password }}"
        REGISTRY_HTPASSWD: '{{ htpasswd .username .password "bcrypt"}}'
  data:
    - secretKey: username
      remoteRef:
        key: /harbor/REGISTRY_USERNAME
    - secretKey: password
      remoteRef:
        key: /harbor/REGISTRY_PASSWORD
