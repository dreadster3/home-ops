apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-postgres
  namespace: harbor
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: harbor-cluster-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: /harbor/POSTGRES_USERNAME
    - secretKey: password
      remoteRef:
        key: /harbor/POSTGRES_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-backup-s3-account
  namespace: harbor
spec:
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: harbor-backup-s3-account
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ACCESS_KEY: "{{ .access_key }}"
        SECRET_KEY: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: /harbor/BACKUP_S3_ACCESS_KEY
    - secretKey: secret_key
      remoteRef:
        key: /harbor/BACKUP_S3_SECRET_KEY
---
apiVersion: external-secrets.io/v1
