apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-cluster
  namespace: vaultwarden
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "disabled"
spec:
  bootstrap:
    recovery: null
    initdb:
      database: vaultwarden
      owner: vaultwarden
      secret:
        name: vaultwarden-cluster-credentials
