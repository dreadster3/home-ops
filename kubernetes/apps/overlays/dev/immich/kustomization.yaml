apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich

labels:
  - pairs:
      app.kubernetes.io/module: immich

resources:
  - ../../../base/immich

patches:
  - path: helm.yaml
    target:
      kind: HelmRelease
  - path: library.yaml
    target:
      kind: PersistentVolumeClaim
  - path: pgcluster.yaml
    target:
      kind: Cluster
  - path: redis.yaml
