apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: joplin-cluster
  namespace: joplin
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "disabled"
spec:
  bootstrap:
    recovery: null
    initdb:
      database: joplin
      owner: joplin
      secret:
        name: joplin-cluster-credentials
