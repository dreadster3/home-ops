apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authentik

labels:
  - pairs:
      app.kubernetes.io/module: authentik

resources:
  - ../../../base/authentik

patches:
  - path: helm.yaml
    target:
      kind: HelmRelease
  - path: pgcluster.yaml
    target:
      kind: Cluster
