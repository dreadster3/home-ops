services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:2.9.2@sha256:3fcfa4d6b6ff22fdbf96ff2aae98dc2fb6d8c1ba0afab1dd2fdfdcdc9ab543c4
    container_name: stirling-pdf
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stifling.rule=Host(`stifling.${INTERNAL_DOMAIN}`) || Host(`pdf.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.stifling.entrypoints=websecure"
      - "traefik.http.routers.stifling.tls.certresolver=letsencrypt"
      - "traefik.http.services.stifling.loadbalancer.server.port=8080"
      - "traefik.http.services.stifling.loadbalancer.server.scheme=http"
    networks:
      - proxy

networks:
  proxy:
    external: true
