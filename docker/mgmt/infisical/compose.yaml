version: "3"

services:
  backend:
    image: infisical/infisical:v0.159.9@sha256:7ef627d2436942d06e8b9f98c4f8d31258357d1de0a3290069eb1817bc612ea1
    container_name: infisical
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    pull_policy: always
    ports:
      - 80:8080
    environment:
      SITE_URL: https://infisical.${INTERNAL_DOMAIN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      DB_CONNECTION_URI: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    networks:
      - infisical

  redis:
    image: redis:8.6.2@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    container_name: infisical-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    container_name: infisical-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: infisical
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: "pg_isready --username=${DB_USER} && psql --username=${DB_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
  proxy:
    external: true
