configs:
  traefik.yaml:
    content: |
      api:
        dashboard: true
        insecure: true

      providers:
        docker:
          exposedByDefault: false
          network: proxy

      entryPoints:
        web:
          address: ":80"
          http:
            redirections:
              entrypoint:
                to: websecure
                scheme: https
        websecure:
          address: ":443"
          http:
            tls:
              certResolver: "letsencrypt"

      certificatesResolvers:
        letsencrypt:
          acme:
            email: "afonso.antunes@live.com.pt"
            storage: "/letsencrypt/acme.json"
            caServer: "https://acme-v02.api.letsencrypt.org/directory"
            dnsChallenge:
              provider: cloudflare  # or your DNS provider
              resolvers:
                - "1.1.1.1:53"
                - "8.8.8.8:53"

      log:
        filePath: /var/log/traefik/traefik.log
        format: json
        level: DEBUG

      accessLog:
        filePath: /var/log/traefik/access.log
        format: json

      serversTransport:
        insecureSkipVerify: true

services:
  traefik:
    container_name: traefik
    image: docker.io/traefik:v3.6.13@sha256:34d5089d0b414945342848518b383f11f5b3a645504ed87b77ffeb9d683d0e48
    cap_drop:
      - ALL
    env_file:
      - traefik.env
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - /var/log/docker/traefik:/var/log/traefik
    configs:
      - source: traefik.yaml
        target: /etc/traefik/traefik.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`mgmt.proxy.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
    cap_add:
      - CAP_NET_BIND_SERVICE
    networks:
      proxy:
        ipv4_address: 172.22.1.254

volumes:
  letsencrypt:
    driver: local

networks:
  proxy:
    name: proxy
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.1.0/24
          gateway: 172.22.1.1
