services:
  omada-controller:
    container_name: omada-controller
    image: docker.io/mbentley/omada-controller:6.1.0.19@sha256:ae11f51e773d9c17f8578b951ced11253b2ef7cfa9c8d46ef99ecdcd8cc25278
    restart: unless-stopped
    user: "508:508"
    environment:
      TZ: Europe/Lisbon
      ROOTLESS: true
      EAP_MONGOD_URI: mongodb://${DB_USER}:${DB_PASS}@mongo:27017/omada
      MONGO_EXTERNAL: true
      SHOW_SERVER_LOGS: true
    depends_on:
      - mongo
    networks:
      - proxy
    ports:
      - 8088:8088
      - 8043:8043
      - 8443:8443
      - 19810:19810/udp
      - 27001:27001/udp
      - 29810:29810/udp
      - 29811-29817:29811-29817
    volumes:
      - data:/opt/tplink/EAPController/data
      - /var/log/docker/omada-controller:/opt/tplink/EAPController/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omada-controller.rule=Host(`omada.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.omada-controller.entrypoints=websecure"
      - "traefik.http.routers.omada-controller.tls.certresolver=letsencrypt"
      - "traefik.http.services.omada-controller.loadbalancer.server.port=8043"
      - "traefik.http.services.omada-controller.loadbalancer.server.scheme=https"
    logging:
      driver: "json-file"

  mongo:
    container_name: omada-controller-db
    image: mongo:8.2.5
    restart: unless-stopped
    environment:
      TZ: Europe/Lisbon
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/data/db

volumes:
  data:
    driver: local
  db_data:
    driver: local

networks:
  proxy:
    external: true
