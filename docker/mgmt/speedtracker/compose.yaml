services:
  speedtracker:
    image: ghcr.io/linuxserver/speedtest-tracker:v1.13.10-ls139@sha256:4023b3e993d3764efe41d65eb4d1be8d9ff2ad8d756eb71de35fe805882ff0b5
    restart: unless-stopped
    container_name: speedtracker
    environment:
      - TZ=Europe/Lisbon
      - APP_TIMEZONE=Europe/Lisbon
      - PUID=1000
      - PGID=1000
      - APP_KEY=${APP_KEY} # Required
      - APP_URL=https://speedtracker.${INTERNAL_DOMAIN}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=speedtest_tracker
      - DB_USERNAME=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPEEDTEST_SCHEDULE="0 */1 * * *"
    volumes:
      - config:/config
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speedtracker.rule=Host(`speedtracker.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.speedtracker.entrypoints=websecure"
      - "traefik.http.routers.speedtracker.tls.certresolver=letsencrypt"
      - "traefik.http.services.speedtracker.loadbalancer.server.port=80"
      - "traefik.http.services.speedtracker.loadbalancer.server.scheme=http"

    networks:
      - default
      - proxy
  db:
    container_name: speedtracker-db
    image: docker.io/postgres:18.3-trixie@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
    restart: always
    environment:
      - POSTGRES_DB=speedtest_tracker
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - default

volumes:
  config:
  db:

networks:
  default:
  proxy:
    external: true
