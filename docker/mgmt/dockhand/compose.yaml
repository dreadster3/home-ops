services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:3.2.15@sha256:a5a143133df569b6103bd555c18b3355d0def538272ab3c65936cc93ebe44368
    container_name: dockhand-socket-proxy
    environment:
      # Default
      - EVENTS=1
      - PING=1
      - VERSION=1
      # Required for Dockhand core functionality
      - POST=1
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - DELETE=1
      # Required for dashboard host info and disk usage
      - INFO=1
      - SYSTEM=1
      # Required for vulnerability scanning
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      # Optional: enable for terminal access
      - EXEC=1
      - DISABLE_IPV6=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
  dockhand:
    container_name: dockhand
    image: docker.io/fnsys/dockhand:v1.0.24@sha256:b4eeaf763a8aca8be2d9ffbd019ca2cd835bfbe15334022c92ce15f3ec75482e
    restart: unless-stopped
    depends_on:
      - socket-proxy
    volumes:
      - data:/app/data
      - doco_data:/data:ro
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockhand.rule=Host(`dockhand.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.dockhand.entrypoints=websecure"
      - "traefik.http.routers.dockhand.tls.certresolver=letsencrypt"
      - "traefik.http.services.dockhand.loadbalancer.server.port=3000"
      - "traefik.http.services.dockhand.loadbalancer.server.scheme=http"

volumes:
  data:
  doco_data:
    external: true

networks:
  default:
    driver: bridge
  proxy:
    external: true
