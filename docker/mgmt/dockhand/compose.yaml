services:
  socket-proxy:
    image: docker.io/tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: dockhand-socket-proxy
    environment:
      # Default
      - EVENTS=1
      - PING=1
      - VERSION=1
      # Required for Dockhand core functionality
      - POST=1
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - DELETE=1
      # Required for dashboard host info and disk usage
      - INFO=1
      - SYSTEM=1
      # Required for vulnerability scanning
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      # Optional: enable for terminal access
      - EXEC=1

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
  dockhand:
    container_name: dockhand
    image: docker.io/fnsys/dockhand:v1.0.22@sha256:3f38c995dfdb1f51f07ffb796162b445744456c2b8a1929c33a8b0593250892e
    restart: unless-stopped
    depends_on:
      - socket-proxy
    volumes:
      - data:/app/data
      - doco_data:/data:ro
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockhand.rule=Host(`dockhand.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.dockhand.entrypoints=websecure"
      - "traefik.http.routers.dockhand.tls.certresolver=letsencrypt"
      - "traefik.http.services.dockhand.loadbalancer.server.port=3000"
      - "traefik.http.services.dockhand.loadbalancer.server.scheme=http"

volumes:
  data:
  doco_data:
    external: true

networks:
  default:
    driver: bridge
  proxy:
    external: true
