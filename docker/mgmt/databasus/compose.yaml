services:
  databasus:
    container_name: databasus
    image: databasus/databasus:v3.32.2@sha256:2c6318e212d09ea8414c34b469a8f521f8a3b30d6009ee2b7fddee47fdd396ef
    volumes:
      - /opt/docker/databasus/data:/databasus-data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.databasus.rule=Host(`databasus.${INTERNAL_DOMAIN}`)"
      - "traefik.http.routers.databasus.entrypoints=websecure"
      - "traefik.http.routers.databasus.tls.certresolver=letsencrypt"
      - "traefik.http.services.databasus.loadbalancer.server.port=4005"
    networks:
      - proxy
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

networks:
  database:
    name: database
    driver: bridge
  proxy:
    external: true
